name: Code & Documentation Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black jsonschema pytest

      - name: Check Code Formatting (Black)
        run: |
          black --check --line-length=120 validators/ tools/ scripts/ tests/ examples/

      - name: Lint Python Code (Flake8)
        run: |
          flake8 validators/ tools/ scripts/ tests/ --max-line-length=120 --ignore=E203,W503
