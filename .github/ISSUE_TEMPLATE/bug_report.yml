name: Bug Report
description: Report a broken validation script, schema bug, or tooling issue
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thank you for reporting a bug! Please provide as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: What steps or commands lead to the failure?
      placeholder: |
        1. Run `python validators/run_all.py`
        2. Encounter validation error on...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment Info
      description: Operating System, Python version, etc.
      placeholder: Ubuntu 24.04, Python 3.11
